# Deploy marketing site to GitHub Pages at https://samuelfabel.github.io/bm-planning/
#
# Pages URL = /{repo-name}/ — must run from the bm-planning repo (not bm-planning-site).
# Site source lives in samuelfabel/bm-planning-site; this workflow checks it out and builds.

name: Deploy site (GitHub Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site
        uses: actions/checkout@v4
        with:
          repository: samuelfabel/bm-planning-site
          ref: main
          path: site

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Sync OpenAPI spec
        working-directory: site
        run: |
          curl -fsSL -o public/openapi.yaml \
            https://raw.githubusercontent.com/samuelfabel/bm-planning/main/server/internal/api/openapi/openapi.yaml

      - name: Build
        working-directory: site
        env:
          VITE_BASE_PATH: /bm-planning/
          VITE_GITHUB_REPO_URL: https://github.com/samuelfabel/bm-planning
          VITE_SITE_URL: https://samuelfabel.github.io/bm-planning/
        run: npx tsc -b && npx vite build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
