name: Docker CI

on:
  push:
    branches: [main]
    paths:
      - 'docker/**'
      - 'server/**'
      - 'web/**'
      - '.dockerignore'
      - '.github/workflows/docker.yml'
  pull_request:
    branches: [main]
    paths:
      - 'docker/**'
      - 'server/**'
      - 'web/**'
      - '.dockerignore'
      - '.github/workflows/docker.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          load: true
          tags: bm-planning:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: |
          docker run -d --name bm-planning-ci -p 18080:8080 bm-planning:ci
          for i in $(seq 1 30); do
            if curl -sf http://localhost:18080/health; then
              exit 0
            fi
            sleep 1
          done
          docker logs bm-planning-ci
          exit 1

      - name: Stop container
        if: always()
        run: docker rm -f bm-planning-ci
