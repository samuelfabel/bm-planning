name: Docker Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to publish (manual runs only)'
        required: false
        default: 'latest'

env:
  IMAGE: samuelfabel/bm-planning

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=${{ inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Update Docker Hub README
        id: update-readme
        continue-on-error: true
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_DESCRIPTION_TOKEN != '' && secrets.DOCKERHUB_DESCRIPTION_TOKEN || secrets.DOCKERHUB_TOKEN }}
          repository: samuelfabel/bm-planning
          readme-filepath: ./docker/README.md

      - name: README sync note
        if: steps.update-readme.outcome == 'failure'
        run: |
          echo "::warning::Docker Hub README was not updated (often 403 Forbidden)."
          echo "Create a Docker Hub access token with Read, Write, and Delete permissions,"
          echo "store it as DOCKERHUB_DESCRIPTION_TOKEN (or replace DOCKERHUB_TOKEN), then re-run this job"
          echo "or paste docker/README.md manually on hub.docker.com."
