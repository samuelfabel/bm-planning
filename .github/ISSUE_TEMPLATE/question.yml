name: Question
description: Question about usage, self-hosting, or contributing
title: '[question] '
labels: ['question']
body:
  - type: textarea
    id: question
    attributes:
      label: Your question
    validations:
      required: true

  - type: dropdown
    id: topic
    attributes:
      label: Topic
      options:
        - self-hosting / Docker
        - Businessmap integration
        - local development
        - contributing
        - other

  - type: markdown
    attributes:
      value: |
        **Tip:** for bugs use the *Bug* template. For vulnerabilities see [SECURITY.md](../../SECURITY.md) — do not open a public issue.
